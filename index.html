<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<div class="app">
  <h1>Image to PDF Pro <span class="badge">MAX</span></h1>
  <p class="tagline">Drag. Insert. Reorder. Smart Crop.</p>

  <div class="settings" style="flex-direction: column; gap: 15px;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <label class="switch">
        <input type="checkbox" id="enableCrop">
        <span class="slider"></span>
      </label>
      <span>Enable Smart Crop (Removes dark edges)</span>
    </div>
    
    <div style="display: flex; align-items: center; gap: 10px;">
      <label for="orientationSelect" style="font-weight: 500;">A4 Orientation:</label>
      <select id="orientationSelect" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 14px; cursor: pointer;">
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
      </select>
    </div>
  </div>

  <div class="upload-box">
    <div class="file-drop">
      <label for="imageInput" class="custom-file-btn">📸 Select Images</label>
      <input type="file" id="imageInput" multiple accept="image/*">
    </div>

    <div class="file-drop">
      <label for="existingPdf" class="custom-file-btn">📄 Add Existing PDF</label>
      <input type="file" id="existingPdf" accept="application/pdf" multiple>
    </div>
  </div>

  <h3>Pages Preview</h3>
  <p class="hint">Drag to reorder • Click ✕ to remove</p>
  <div id="pagesContainer" class="pages-container"></div>

  <div class="controls">
    <button class="btn-primary" onclick="generatePDF()">Generate Auto-Size PDF</button>
    <button class="btn-primary" style="background: #8b5cf6;" onclick="generateFixedPDF()">Generate A4 PDF</button>
    
    <button class="btn-primary" style="background: linear-gradient(45deg, #ff007f, #7928ca);" onclick="openSurprise()">Surprise 🎁</button>

    <button class="btn-secondary" onclick="clearAll()">Clear All</button>
    <button id="downloadBtn" class="btn-success" style="display:none;" onclick="downloadPDF()">⬇ Download</button>
  </div>

  <div class="progress-container">
    <div id="progressBar"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
