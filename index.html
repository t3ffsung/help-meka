<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>Image to PDF Pro</h1>
  <p class="tagline">Drag. Insert. Reorder. Smart Crop.</p>

  <div class="upload-box">
    <div>
      <label>Select Images</label>
      <input type="file" id="imageInput" multiple accept="image/*">
    </div>

    <div>
      <label>Upload Existing PDF (Optional)</label>
      <input type="file" id="existingPdf" accept="application/pdf">
    </div>
  </div>

  <h3>Pages Preview (Drag Images Between Pages)</h3>
  <div id="pagesContainer" class="pages-container"></div>

  <div class="controls">
    <button onclick="generatePDF()">Generate PDF</button>
    <button onclick="clearAll()">Clear All</button>
    <button id="downloadBtn" style="display:none;" onclick="downloadPDF()">Download PDF</button>
  </div>

  <div class="progress-container">
    <div id="progressBar"></div>
  </div>

</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="script.js"></script>

</body>
</html>
